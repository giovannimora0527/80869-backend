spring.application.name=clinica

server.port=8081
server.tomcat.threads.max=32
server.servlet.contextPath=/clinica/v1

# Configuración de conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/clinica
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate (ORM) - NO CREAR NI MODIFICAR BD
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Configuración de pool de conexiones Hikari (opcional, mejora el rendimiento)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# La base de datos ya existe, no inicializar esquema
spring.sql.init.mode=never
# spring.sql.init.schema-locations=classpath:schema.sql
